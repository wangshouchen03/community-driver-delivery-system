<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>社区司机物流送货服务接单系统｜作品集展示</title><style>html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:#eef7f4}#site{display:block;width:100%;height:100%;border:0;margin:0;padding:0}</style></head><body>
<iframe id="site" src="社区司机物流送货服务接单系统-作品集展示.html" title="社区司机物流送货服务接单系统作品集展示"></iframe>
<script>
const site=document.getElementById('site');
function insertDeliveryFlow(){
  const doc=site.contentDocument;if(!doc||doc.getElementById('delivery-flow'))return;
  const style=doc.createElement('style');style.id='delivery-flow-style';style.textContent=`
    #delivery-flow .flow-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:9px}
    #delivery-flow .flow-step{padding:14px;border-radius:18px;background:#fff;border:1px solid var(--line);min-height:132px}
    #delivery-flow .flow-step i{display:grid;place-items:center;width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;font-style:normal;font-size:12px;font-weight:900}
    #delivery-flow .flow-step b{display:block;margin:9px 0 5px;font-size:13px}
    #delivery-flow .flow-step span{display:block;font-size:11px;color:var(--muted);line-height:1.55}
    @media(max-width:1050px){#delivery-flow .flow-grid{grid-template-columns:repeat(4,1fr)}}
    @media(max-width:700px){#delivery-flow .flow-grid{grid-template-columns:1fr}#delivery-flow .flow-step{min-height:0}}
  `;doc.head.appendChild(style);
  const section=doc.createElement('section');section.className='section';section.id='delivery-flow';section.innerHTML=`<div class="container"><div class="head"><div><h2>配送全流程</h2><p class="desc">从司机上线、接收请求到完成配送与收入结算，每个节点对应系统中的实际操作与状态变化。</p></div><div><span class="tag">即时请求</span><span class="tag">预约请求</span><span class="tag">收入结算</span></div></div><div class="flow-grid"><div class="flow-step"><i>1</i><b>司机上线</b><span>根据工作时间和兴趣上线，进入可接单状态。</span></div><div class="flow-step"><i>2</i><b>接收请求</b><span>即时或预约请求进入列表，展示取送地点和配送时间。</span></div><div class="flow-step"><i>3</i><b>查看详情</b><span>核对距离、路线、包裹数量、重量、报酬与用户反馈。</span></div><div class="flow-step"><i>4</i><b>接受或拒绝</b><span>司机结合当前位置、工作安排和个人偏好自主决策。</span></div><div class="flow-step"><i>5</i><b>实时沟通</b><span>通过内置聊天联系客户或企业，确认地址与配送事项。</span></div><div class="flow-step"><i>6</i><b>完成配送</b><span>任务送达后标记完成，回传配送结果与评价。</span></div><div class="flow-step"><i>7</i><b>收入结算</b><span>按配送距离、包裹数量及奖励或小费计算透明收入。</span></div></div></div>`;
  const demo=doc.getElementById('demo');demo.parentNode.insertBefore(section,demo);
}
site.addEventListener('load',()=>setTimeout(insertDeliveryFlow,0));
</script></body></html>
