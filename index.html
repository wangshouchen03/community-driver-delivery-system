<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社区司机物流送货服务接单系统 V1.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#ff6b35;--primary-light:#ff8552;--primary-dark:#e55a2b;
  --accent:#1a1a2e;--accent-light:#16213e;
  --success:#06d6a0;--success-dark:#05b98b;
  --warning:#ffd166;--warning-dark:#f0c04a;
  --danger:#ef476f;--danger-dark:#d63d5f;
  --gray-50:#fafbfc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
  --gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;
  --gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;
  --gray-900:#0f172a;--white:#ffffff;
  --radius-sm:8px;--radius:14px;--radius-lg:20px;--radius-xl:28px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-md:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.04);
  --shadow-lg:0 20px 40px -5px rgba(0,0,0,.1),0 8px 16px -6px rgba(0,0,0,.05);
  --shadow-xl:0 25px 50px -12px rgba(0,0,0,.15);
  --glass:rgba(255,255,255,.72);
  --glass-border:rgba(255,255,255,.3);
  --blur:blur(20px);
  --transition:all .25s cubic-bezier(.4,0,.2,1);
}

/* ============ GLOBAL ============ */
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  background:linear-gradient(135deg,#f0f4ff 0%,#fef7f0 30%,#fff5f5 60%,#f0faf5 100%);
  background-attachment:fixed;
  color:var(--gray-800);
  height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
::selection{background:var(--primary);color:white}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-500)}
.app-container::-webkit-scrollbar-thumb{background:var(--gray-400);border-radius:5px}
.app-container:hover::-webkit-scrollbar-thumb{background:var(--gray-500)}

/* ============ APP SHELL ============ */
.app-container{
  max-width:440px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;
  background:rgba(255,255,255,.85);backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  position:relative;box-shadow:var(--shadow-xl);
  border-left:1px solid var(--glass-border);
  border-right:1px solid var(--glass-border);
}
.app-container>*{flex-shrink:0}

/* ============ HEADER ============ */
.header{
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-light) 100%);
  color:var(--white);padding:18px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;flex-shrink:0;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:0 4px 20px rgba(26,26,46,.15);
}
.header h1{font-size:17px;font-weight:700;letter-spacing:-.2px}
.header-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);
  color:var(--white);font-size:15px;cursor:pointer;
  padding:8px 14px;border-radius:var(--radius-sm);
  transition:var(--transition);backdrop-filter:blur(4px);
}
.header-btn:hover{background:rgba(255,255,255,.2);transform:scale(1.05)}
.header-btn:active{transform:scale(.95)}
.back-btn{
  background:rgba(255,255,255,.1);border:none;color:var(--white);
  cursor:pointer;font-size:18px;padding:8px 10px;margin-right:8px;
  border-radius:var(--radius-sm);display:flex;align-items:center;
  transition:var(--transition);
}
.back-btn:hover{background:rgba(255,255,255,.2)}

/* ============ BOTTOM NAV ============ */
.bottom-nav{
  position:sticky;bottom:0;flex-shrink:0;margin-top:auto;
  background:rgba(255,255,255,.92);backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border-top:1px solid var(--gray-200);
  display:flex;padding:6px 0 10px;z-index:100;
  box-shadow:0 -4px 20px rgba(0,0,0,.04);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;cursor:pointer;padding:4px;color:var(--gray-400);
  font-size:11px;font-weight:500;border:none;background:none;
  transition:var(--transition);position:relative;
}
.nav-item.active{color:var(--primary)}
.nav-item.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--primary);border-radius:3px 3px 0 0}
.nav-item:active{transform:scale(.9)}

/* ============ CARDS ============ */
.card{
  background:var(--white);border-radius:var(--radius-lg);
  padding:18px;margin:14px 16px;
  box-shadow:var(--shadow);border:1px solid var(--gray-100);
  transition:var(--transition);
}
.card:hover{box-shadow:var(--shadow-md)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:15px;font-weight:700;color:var(--gray-800);letter-spacing:-.1px}

/* ============ STATS GRID ============ */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px}
.stat-card{
  background:var(--white);border-radius:var(--radius-lg);
  padding:18px 14px;box-shadow:var(--shadow);
  text-align:center;cursor:pointer;transition:var(--transition);
  border:1px solid var(--gray-100);position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;top:-20px;right:-20px;
  width:60px;height:60px;border-radius:50%;opacity:.06;
  transition:var(--transition);
}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.stat-card:hover::after{transform:scale(1.5)}
.stat-card:nth-child(1)::after{background:var(--primary)}
.stat-card:nth-child(2)::after{background:var(--warning)}
.stat-card:nth-child(3)::after{background:var(--success)}
.stat-card:nth-child(4)::after{background:var(--primary)}
.stat-value{font-size:30px;font-weight:800;color:var(--primary);line-height:1.1}
.stat-label{font-size:11px;color:var(--gray-500);margin-top:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.stat-card.warning .stat-value{color:var(--warning-dark)}
.stat-card.success .stat-value{color:var(--success-dark)}
.stat-card.warning::after{background:var(--warning)}
.stat-card.success::after{background:var(--success)}

/* ============ REQUEST LIST ============ */
.request-item{
  display:flex;align-items:center;padding:15px 16px;
  border-bottom:1px solid var(--gray-100);cursor:pointer;
  transition:var(--transition);gap:13px;position:relative;
}
.request-item:last-child{border-bottom:none}
.request-item:hover{background:linear-gradient(90deg,var(--gray-50),transparent);padding-left:20px}
.request-item:active{background:var(--gray-100)}
.request-icon{
  width:48px;height:48px;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;transition:var(--transition);
  position:relative;
}
.request-icon.pickup{background:linear-gradient(135deg,#fff7ed,#ffedd5);color:var(--primary)}
.request-icon.deliver{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:var(--success-dark)}
.request-icon.urgent{background:linear-gradient(135deg,#fff1f2,#ffe4e6);color:var(--danger)}
.request-info{flex:1;min-width:0}
.request-title{font-size:15px;font-weight:600;margin-bottom:3px;color:var(--gray-900);letter-spacing:-.1px}
.request-desc{font-size:12px;color:var(--gray-500);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.request-amount{font-size:17px;font-weight:700;color:var(--primary);white-space:nowrap;font-variant-numeric:tabular-nums}
.request-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center}

/* ============ BADGES ============ */
.badge{
  font-size:10px;padding:3px 10px;border-radius:20px;
  font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  transition:var(--transition);
}
.badge-new{background:linear-gradient(135deg,#fff7ed,#ffedd5);color:var(--primary-dark);border:1px solid rgba(255,107,53,.2)}
.badge-progress{background:linear-gradient(135deg,#fffbeb,#fef3c7);color:#b45309;border:1px solid rgba(245,158,11,.2)}
.badge-done{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46;border:1px solid rgba(6,214,160,.2)}
.badge-urgent{background:linear-gradient(135deg,#fff1f2,#ffe4e6);color:var(--danger-dark);border:1px solid rgba(239,71,111,.2);animation:pulse-urgent 2s ease-in-out infinite}
@keyframes pulse-urgent{0%,100%{opacity:1}50%{opacity:.7}}

/* ============ DETAIL PAGE ============ */
.detail-section{
  margin:14px 16px;background:var(--white);
  border-radius:var(--radius-lg);box-shadow:var(--shadow);
  overflow:hidden;border:1px solid var(--gray-100);
  transition:var(--transition);
}
.detail-row{
  display:flex;padding:15px 18px;
  border-bottom:1px solid var(--gray-100);align-items:center;
  transition:background .15s;
}
.detail-row:hover{background:var(--gray-50)}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:12px;color:var(--gray-500);width:75px;flex-shrink:0;font-weight:500;letter-spacing:.3px}
.detail-value{font-size:14px;font-weight:600;flex:1;color:var(--gray-800)}

/* ============ TIMELINE ============ */
.timeline{padding:18px 16px}
.timeline-item{display:flex;gap:14px;padding-bottom:22px;position:relative}
.timeline-item:last-child{padding-bottom:0}
.timeline-dot{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;z-index:1;transition:var(--transition);
  font-weight:700;
}
.timeline-dot.active{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:var(--white);box-shadow:0 4px 12px rgba(255,107,53,.3)}
.timeline-dot.inactive{background:var(--gray-100);color:var(--gray-400);border:2px dashed var(--gray-300)}
.timeline-line{position:absolute;left:16px;top:34px;bottom:0;width:2px;background:linear-gradient(180deg,var(--primary-light),var(--gray-200))}
.timeline-content{flex:1;padding-top:2px}
.timeline-title{font-size:13px;font-weight:600;color:var(--gray-800)}
.timeline-time{font-size:11px;color:var(--gray-500);margin-top:2px}

/* ============ BUTTONS ============ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:6px;padding:12px 22px;border-radius:var(--radius);
  font-size:14px;font-weight:600;cursor:pointer;border:none;
  transition:var(--transition);letter-spacing:-.1px;
  position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.15),transparent);pointer-events:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--white);box-shadow:0 4px 14px rgba(255,107,53,.3)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(255,107,53,.4);transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,var(--success),var(--success-dark));color:var(--white);box-shadow:0 4px 14px rgba(6,214,160,.3)}
.btn-success:hover{box-shadow:0 6px 20px rgba(6,214,160,.4);transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,var(--danger),var(--danger-dark));color:var(--white);box-shadow:0 4px 14px rgba(239,71,111,.3)}
.btn-danger:hover{box-shadow:0 6px 20px rgba(239,71,111,.4);transform:translateY(-1px)}
.btn-outline{background:var(--white);color:var(--primary);border:2px solid var(--primary);box-shadow:var(--shadow-sm)}
.btn-outline:hover{background:linear-gradient(135deg,#fff7ed,#ffedd5);border-color:var(--primary-dark)}
.btn-block{width:100%}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:var(--radius-sm)}
.btn-group{display:flex;gap:10px;padding:16px}
button:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}

/* ============ CHAT ============ */
.chat-container{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;background:linear-gradient(180deg,#f8fafc,#f1f5f9)}
.chat-messages{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.chat-bubble{max-width:78%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.55;position:relative;animation:msg-in .3s ease-out}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-bubble.sent{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:var(--white);align-self:flex-end;
  border-bottom-right-radius:6px;
  box-shadow:0 4px 12px rgba(255,107,53,.2);
}
.chat-bubble.received{
  background:var(--white);align-self:flex-start;
  border-bottom-left-radius:6px;
  box-shadow:var(--shadow-sm);border:1px solid var(--gray-200);
}
.chat-time{font-size:10px;margin-top:5px;opacity:.7;text-align:right}
.chat-input-area{display:flex;gap:10px;padding:12px 14px;border-top:1px solid var(--gray-200);background:rgba(255,255,255,.95);backdrop-filter:var(--blur)}
.chat-input{
  flex:1;padding:11px 18px;border:2px solid var(--gray-200);
  border-radius:24px;font-size:14px;outline:none;
  transition:var(--transition);background:var(--gray-50);
}
.chat-input:focus{border-color:var(--primary);background:var(--white);box-shadow:0 0 0 4px rgba(255,107,53,.08)}
.chat-send{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:white;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 4px 12px rgba(255,107,53,.3);
  transition:var(--transition);
}
.chat-send:hover{transform:scale(1.08);box-shadow:0 6px 18px rgba(255,107,53,.4)}
.chat-send:active{transform:scale(.92)}

/* ============ LOGIN ============ */
.login-container{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100vh;padding:28px;
  background:linear-gradient(160deg,var(--accent) 0%,#0f3460 40%,var(--primary-dark) 100%);
  position:relative;overflow:hidden;
}
.login-container::before{
  content:'';position:absolute;top:-80px;right:-60px;
  width:240px;height:240px;border-radius:50%;
  background:rgba(255,255,255,.04);
}
.login-container::after{
  content:'';position:absolute;bottom:-100px;left:-40px;
  width:300px;height:300px;border-radius:50%;
  background:rgba(255,255,255,.03);
}
.login-card{
  background:rgba(255,255,255,.95);backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border-radius:var(--radius-xl);padding:36px 28px;
  width:100%;max-width:380px;box-shadow:var(--shadow-xl);
  position:relative;z-index:1;border:1px solid var(--glass-border);
}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .icon{font-size:60px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-logo h2{font-size:22px;font-weight:800;margin-top:10px;color:var(--gray-900);letter-spacing:-.3px}
.login-logo p{font-size:13px;color:var(--gray-500);margin-top:6px;font-weight:500}
.form-group{margin-bottom:18px}
.form-label{font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.form-input{
  width:100%;padding:13px 18px;border:2px solid var(--gray-200);
  border-radius:var(--radius);font-size:15px;outline:none;
  transition:var(--transition);background:var(--gray-50);
}
.form-input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(255,107,53,.08);
  background:var(--white);
}

/* ============ TABS ============ */
.tabs{display:flex;border-bottom:2px solid var(--gray-200);margin:0 16px;gap:0}
.tab{
  flex:1;padding:13px 8px;text-align:center;font-size:14px;
  font-weight:600;color:var(--gray-500);cursor:pointer;
  border:none;background:none;
  border-bottom:2px solid transparent;margin-bottom:-2px;
  transition:var(--transition);position:relative;
}
.tab:hover{color:var(--gray-700)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ============ RATING STARS ============ */
.stars{display:flex;gap:6px;justify-content:center;margin:10px 0}
.star{font-size:36px;cursor:pointer;color:var(--gray-200);transition:var(--transition)}
.star.filled,.star:hover{color:#f59e0b;transform:scale(1.15)}
.star:hover{transform:scale(1.2)}

/* ============ PROFILE ============ */
.profile-header{
  text-align:center;padding:28px 24px;
  background:linear-gradient(160deg,var(--accent) 0%,var(--accent-light) 100%);
  color:var(--white);position:relative;overflow:hidden;
}
.profile-header::after{
  content:'';position:absolute;bottom:-30px;right:-30px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.05);
}
.profile-avatar{
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.15);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;margin:0 auto 14px;
  border:3px solid rgba(255,255,255,.25);
  box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.profile-name{font-size:21px;font-weight:800;letter-spacing:-.2px}
.profile-phone{font-size:12px;opacity:.8;margin-top:5px;font-weight:500}

/* ============ MODALS ============ */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(15,23,42,.6);backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  z-index:200;padding:20px;animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--white);border-radius:var(--radius-xl);
  padding:28px 24px;width:100%;max-width:360px;
  box-shadow:var(--shadow-xl);animation:scaleIn .25s cubic-bezier(.4,0,.2,1);
  border:1px solid var(--gray-100);
}
@keyframes scaleIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:20px;margin-bottom:8px;font-weight:800;color:var(--gray-900);letter-spacing:-.2px}
.modal p{font-size:14px;color:var(--gray-600);margin-bottom:20px;line-height:1.6}
.modal-buttons{display:flex;gap:10px;justify-content:flex-end}

/* ============ TOAST ============ */
.toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);
  background:var(--gray-900);color:var(--white);padding:13px 26px;
  border-radius:24px;font-size:13px;font-weight:600;
  z-index:300;animation:slideDown .35s cubic-bezier(.4,0,.2,1);
  white-space:nowrap;box-shadow:var(--shadow-lg);
  }
.toast.success{background:linear-gradient(135deg,#059669,#10b981);color:#ff6b35!important;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.toast.error{background:linear-gradient(135deg,#be123c,#e11d48);text-shadow:0 1px 2px rgba(0,0,0,.2)}
@keyframes slideDown{from{transform:translate(-50%,-120%);opacity:0}to{transform:translate(-50%,0);opacity:1}}

/* ============ SCROLL AREA ============ */
.scroll-area{overflow-y:auto;max-height:calc(100vh - 175px);-webkit-overflow-scrolling:touch;scroll-behavior:smooth}

/* ============ INCOME ============ */
.income-total{
  text-align:center;padding:28px 20px;
  background:linear-gradient(160deg,var(--success-dark),var(--success),#10b981);
  color:var(--white);border-radius:var(--radius-xl);
  margin:14px 16px;box-shadow:0 8px 24px rgba(6,214,160,.25);
  position:relative;overflow:hidden;
}
.income-total::after{
  content:'';position:absolute;top:-50px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.08);
}
.income-amount{font-size:44px;font-weight:900;font-variant-numeric:tabular-nums;position:relative;z-index:1}
.income-subtitle{font-size:12px;opacity:.85;margin-top:6px;font-weight:500;position:relative;z-index:1}
.income-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 18px;border-bottom:1px solid var(--gray-100);
  transition:background .15s;
}
.income-row:hover{background:var(--gray-50)}
.income-date{font-size:12px;color:var(--gray-500);font-weight:500}
.income-order{font-size:13px;font-weight:600;color:var(--gray-800)}
.income-price{font-size:16px;font-weight:700;color:var(--success-dark);font-variant-numeric:tabular-nums}

/* ============ CHARTS ============ */
.chart-bar{
  height:10px;background:var(--gray-100);
  border-radius:5px;overflow:hidden;margin-top:8px;
}
.chart-fill{
  height:100%;border-radius:5px;
  transition:width .8s cubic-bezier(.4,0,.2,1);

function renderChat(){var r=state.requests.find(function(req){return req.id===state.selectedRequest});if(!r)return renderHome();if(!state._chatMsgs[r.id]){state._chatMsgs[r.id]=[{text:'您好，我已经接受了您的配送请求！',time:'14:35',sent:true},{text:'太好了！请问大概什么时候能送到？',time:'14:36',sent:false},{text:'预计30分钟内可以送达。',time:'14:36',sent:true},{text:'好的，到了请打电话给我。',time:'14:37',sent:false}]}var msgs=state._chatMsgs[r.id];var msgsHtml='';for(var i=0;i<msgs.length;i++){var m=msgs[i];msgsHtml+='<div class="chat-bubble '+(m.sent?'sent':'received')+'">'+m.text+'<div class="chat-time">'+m.time+'</div></div>'}return'<div class="header"><button class="back-btn" onclick="navigate(\'detail\',\''+r.id+'\')">←</button><h1>'+r.customer.name+'</h1></div><div class="chat-container"><div style="padding:8px 16px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);font-size:12px;color:var(--gray-500);text-align:center">订单: '+r.id+' · '+r.title+'</div><div class="chat-messages" id="chatMsgs">'+msgsHtml+'</div><div class="chat-input-area"><input class="chat-input" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key===\'Enter\')sendChat()"><button class="chat-send" onclick="sendChat()">➤</button></div></div>'}
function sendChat(){var input=document.getElementById('chatInput');var r=state.requests.find(function(req){return req.id===state.selectedRequest});if(!input||!input.value.trim()||!r)return;var msg=input.value.trim();if(!state._chatMsgs[r.id])state._chatMsgs[r.id]=[];state._chatMsgs[r.id].push({text:msg,time:formatTime(),sent:true});input.value='';render();setTimeout(function(){var ar=['好的，谢谢！','收到，麻烦您了','大概还要多久？','路上注意安全','到了请打电话给我'];var reply=ar[Math.floor(Math.random()*ar.length)];state._chatMsgs[r.id].push({text:reply,time:formatTime(),sent:false});render();var con=document.getElementById('chatMsgs');if(con)con.scrollTop=con.scrollHeight},800+Math.random()*1500)}
function renderIncome(){var total=state.incomeHistory.reduce(function(s,i){return s+i.amount},0);var itemsHtml='';for(var i=0;i<state.incomeHistory.length;i++){var it=state.incomeHistory[i];itemsHtml+='<div class="income-row"><div><div class="income-date">'+it.date+'</div><div class="income-order">'+it.order+'</div></div><div class="income-price">+¥'+it.amount+'</div></div>'}var days=['周一','周二','周三','周四','周五','周六','周日'],vals=[120,85,45,367,142,210,0];var max=Math.max.apply(null,vals);var chartHtml='';for(var i=0;i<days.length;i++){chartHtml+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:12px;width:32px;color:var(--gray-500)">'+days[i]+'</span><div class="chart-bar" style="flex:1"><div class="chart-fill" style="width:'+(vals[i]/max*100)+'%"></div></div><span style="font-size:13px;font-weight:600;width:48px;text-align:right">¥'+vals[i]+'</span></div>'}var thisMonth=state.incomeHistory.slice(0,7).reduce(function(s,i){return s+i.amount},0);return'<div class="header"><button class="back-btn" onclick="navigate(\'home\')">←</button><h1>💰 收入结算</h1></div><div class="income-total"><div class="income-subtitle">累计收入</div><div class="income-amount">¥'+total.toLocaleString()+'</div><div class="income-subtitle">本月收入 ¥'+thisMonth+' · 共'+state.incomeHistory.length+'笔</div></div><div class="card"><div class="card-header"><span class="card-title">📊 收入趋势（近7天）</span></div>'+chartHtml+'</div><div class="card" style="padding:0"><div class="card-header" style="padding:16px"><span class="card-title">📋 收入明细</span></div>'+itemsHtml+'</div>'}
function renderProfile(){var h='<div class="header"><button class="back-btn" onclick="navigate(\'home\')">←</button><h1>个人资料</h1><button class="header-btn" onclick="doLogout()">退出</button></div><div class="profile-header"><div class="profile-avatar">🚛</div><div class="profile-name">'+state.profile.name+'</div><div class="profile-phone">📱 '+state.profile.phone+'</div><div style="margin-top:8px;display:flex;gap:16px;justify-content:center;font-size:12px"><span>⭐ '+state.profile.rating+'</span><span>📦 '+state.profile.orders+'单</span></div></div><div class="detail-section"><div class="detail-row"><span class="detail-label">🚛 车辆</span><span class="detail-value">'+state.profile.vehicle+'</span></div><div class="detail-row"><span class="detail-label">🔢 车牌</span><span class="detail-value">'+state.profile.license+'</span></div><div class="detail-row"><span class="detail-label">🕘 工作时间</span><span class="detail-value">'+state.profile.workHours+'</span></div><div class="detail-row"><span class="detail-label">⭐ 评分</span><span class="detail-value">'+'⭐'.repeat(Math.floor(state.profile.rating))+' '+state.profile.rating+'</span></div><div class="detail-row"><span class="detail-label">📦 总订单</span><span class="detail-value">'+state.profile.orders+' 单</span></div></div><div class="detail-section"><div style="padding:16px;border-bottom:1px solid var(--gray-100);font-size:16px;font-weight:600">🏷️ 兴趣偏好</div><div style="padding:16px;display:flex;gap:8px;flex-wrap:wrap">';for(var i=0;i<state.profile.interests.length;i++){h+='<span class="badge badge-new" style="font-size:13px;padding:6px 14px">'+state.profile.interests[i]+'</span>'}h+='</div></div><div class="btn-group"><button class="btn btn-outline btn-block" onclick="navigate(\'analysis\')">📊 查看数据分析</button></div>';return h}
function renderAnalysis(){var mh='';var months=[{month:'1月',count:42,income:2350},{month:'12月',count:38,income:1980},{month:'11月',count:35,income:1890},{month:'10月',count:41,income:2200}];for(var i=0;i<months.length;i++){var m=months[i];mh+='<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--gray-100)"><span style="font-size:13px;font-weight:600;width:36px">'+m.month+'</span><div class="chart-bar" style="flex:1"><div class="chart-fill" style="width:'+(m.count/42*100)+'%;background:var(--primary)"></div></div><span style="font-size:12px;color:var(--gray-500);width:40px">'+m.count+'单</span><span style="font-size:13px;font-weight:600;color:var(--success);width:56px;text-align:right">¥'+m.income+'</span></div>'}var ch='';var cats=[{name:'生鲜配送',pct:35,color:'#16a34a'},{name:'文件急送',pct:25,color:'#2563eb'},{name:'家具配送',pct:20,color:'#ea580c'},{name:'电子产品',pct:12,color:'#9333ea'},{name:'餐饮外卖',pct:8,color:'#dc2626'}];for(var i=0;i<cats.length;i++){var c=cats[i];ch+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:12px;width:64px;color:var(--gray-600)">'+c.name+'</span><div class="chart-bar" style="flex:1"><div class="chart-fill" style="width:'+c.pct+'%;background:'+c.color+'"></div></div><span style="font-size:12px;font-weight:600;width:36px;text-align:right">'+c.pct+'%</span></div>'}return'<div class="header"><button class="back-btn" onclick="navigate(\'profile\')">←</button><h1>📊 数据分析</h1></div><div class="stats-grid"><div class="stat-card"><div class="stat-value">156</div><div class="stat-label">📦 总订单数</div></div><div class="stat-card success"><div class="stat-value">¥8,420</div><div class="stat-label">💰 总收入</div></div><div class="stat-card warning"><div class="stat-value">4.8</div><div class="stat-label">⭐ 平均评分</div></div><div class="stat-card"><div class="stat-value">2,356</div><div class="stat-label">📏 总里程(km)</div></div></div><div class="card"><div class="card-header"><span class="card-title">📈 月度订单统计</span></div>'+mh+'</div><div class="card"><div class="card-header"><span class="card-title">🏆 配送品类分布</span></div>'+ch+'</div>'}
function renderModals(){var html='';if(state._showRejectModal){html+='<div class="modal-overlay" onclick="if(event.target===this)cancelReject()"><div class="modal"><h3>确认拒绝</h3><p>确定要拒绝这个配送请求吗？</p><div class="modal-buttons"><button class="btn btn-outline btn-sm" onclick="cancelReject()">取消</button><button class="btn btn-danger btn-sm" onclick="confirmReject()">确认拒绝</button></div></div></div>'}if(state._showRatingModal){var r=state.requests.find(function(req){return req.id===state._completeId});var sh='';for(var i=1;i<=5;i++){sh+='<span class="star '+(state._rating>=i?'filled':'')+'" onclick="setRating('+i+')">★</span>'}html+='<div class="modal-overlay"><div class="modal"><h3>⭐ 完成配送</h3><p>订单「'+(r?r.title:'')+'」已送达，请对本次配送进行评价</p><div class="stars">'+sh+'</div><div class="modal-buttons" style="margin-top:16px"><button class="btn btn-outline btn-sm" onclick="cancelRating()">稍后评价</button><button class="btn btn-success btn-sm" onclick="submitRating()"'+(state._rating===0?' disabled style="opacity:.5"':'')+'>提交评价</button></div></div></div>'}return html}
function renderBottomNav(){var pages=[{id:'home',icon:'🏠',label:'首页'},{id:'requests',icon:'📋',label:'订单'},{id:'income',icon:'💰',label:'收入'},{id:'profile',icon:'👤',label:'我的'}];var html='';for(var i=0;i<pages.length;i++){var p=pages[i];html+='<button class="nav-item '+(state.currentPage===p.id?'active':'')+'" onclick="navigate(\''+p.id+'\')"><span style="font-size:22px">'+p.icon+'</span><span>'+p.label+'</span></button>'}return'<div class="bottom-nav">'+html+'</div>'}
